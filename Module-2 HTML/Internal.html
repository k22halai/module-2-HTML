<!DOCTYPE html>
<html>
<head>
    <title>Internal CSS Example</title>
    <style>
        body { background-color: #f4f6f9; font-family: Arial; }
        h1 { color: red; text-align: center; }
        p { font-size: 18px; color: purple; }
    </style>
</head>
<body>
    <h1>Welcome to Internal CSS</h1>
    <p>This paragraph is styled using internal CSS inside the &lt;style&gt; tag.</p>
</body>
</html>
