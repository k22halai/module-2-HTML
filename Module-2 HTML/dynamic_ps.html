<!DOCTYPE html>
<html>
<head>
    <title>Dynamic Pseudo Class Example</title>
    <link rel="stylesheet" type="text/css" href="style2.css">
</head>
<body>
    <h2>Dynamic Pseudo Class Demo</h2>

    <!-- Button with hover and active effect -->
    <button class="btn">Hover or Click Me</button>

    <!-- Input field with focus effect -->
    <br><br>
    <input type="text" placeholder="Click here to see focus effect">

    <!-- Link with hover and active effect -->
    <br><br>
    <a href="https://www.google.com" target="_blank">Visit Google</a>
</body>
</html>
